<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link rel="stylesheet" href="style.css">
    <script src="nav.js" defer></script>
    <style>
        .edit-btn, .delete-btn {
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
            position: relative;
            overflow: hidden;
        }
        .edit-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(76,175,80,0.4);
        }
        .delete-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(244,67,54,0.4);
        }
        .edit-btn:disabled, .delete-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        /* spinner inside button */
        .btn-spinner {
            display: none;
            width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: btnSpin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 4px;
        }
        .btn-working .btn-spinner { display: inline-block; }
        @keyframes btnSpin { to { transform: rotate(360deg); } }

        /* ── Report card layout with profile photo ── */
        .report-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
        }
        .report-card-left { flex: 1; }
        .report-card-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 120px;
        }
        .profile-photo {
            width: 100px; height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4a90e2;
            box-shadow: 0 2px 8px rgba(74,144,226,0.3);
        }
        .profile-placeholder {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4a90e2, #06038e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            border: 3px solid #4a90e2;
            box-shadow: 0 2px 8px rgba(74,144,226,0.3);
            flex-shrink: 0;
        }
        .upload-label {
            font-size: 12px;
            color: #4a90e2;
            cursor: pointer;
            text-decoration: underline;
            text-align: center;
        }
        .upload-input { display: none; }
        .student-name-badge {
            font-size: 13px;
            color: #555;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>

<body class="Reports">
    <header>
        <nav>
            <div class="logo">
                <img src="https://indzara.com/wp-content/uploads/2015/06/School-Attendance-Register.jpg" alt="logo"
                    height="50px">
                <h2>Student Tracker</h2>
            </div>
            <ul>
                <li><a href="Home.html">Home</a></li>
                <li><a href="student.html">Add Student</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="reports.html">Reports</a></li>
            </ul>
            </div>
        </nav>
    </header>
    <main>
        <div class="container">

           <h2>Reports</h2>

           <div id="studentTable"></div>

           <h2>Student Report Cards</h2>

           <div id="reportCards"></div>

        </div>

        <div class="search-box">

    <input
        type="text"
        id="searchInput"
        placeholder="Enter student name or roll no"
    >

    <button onclick="searchStudent()">
        Search
    </button>

</div>

<div id="searchResult"></div>
    </main>
    <footer></footer>
<script>

    if (!localStorage.getItem("user")) {
    window.location.href = "login.html";
}
async function loadStudents() {
    const res = await fetch("http://localhost:5000/api/students");
    const data = await res.json();

    let html = `
        <h2>Student List</h2>
        <table border="1" cellpadding="10">
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Class</th>
                <th>Action</th>
            </tr>
    `;

    data.forEach((s, index) => {
        html += `
            <tr>
                <td>${s.name}</td>
                <td>${s.rollNo}</td>
                <td>${s.className}</td>
                <td>
                    <button class="edit-btn" onclick="editStudent(this, ${index}, '${s.name}', '${s.rollNo}', '${s.className}')">
                        <span class="btn-spinner"></span>✏️ Edit
                    </button>
                    <button class="delete-btn" onclick="deleteStudent(this, ${index})">
                        <span class="btn-spinner"></span>🗑️ Delete
                    </button>
                </td>
            </tr>
        `;
    });

    html += "</table>";
    document.getElementById("studentTable").innerHTML = html;
}

async function editStudent(btn, index, name, rollNo, className) {
    const newName  = prompt("Enter new name:", name);
    const newRoll  = prompt("Enter new roll no:", rollNo);
    const newClass = prompt("Enter new class:", className);
    if (!newName || !newRoll || !newClass) return;

    // disable both buttons in this row, show spinner
    const row = btn.closest('tr');
    const btns = row.querySelectorAll('button');
    btns.forEach(function(b) {
        b.disabled = true;
        b.classList.add('btn-working');
    });

    await fetch(`http://localhost:5000/api/students/${index}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: newName, rollNo: newRoll, className: newClass })
    });

    loadStudents();
}

async function deleteStudent(btn, index) {
    if (!confirm("Are you sure you want to delete this student?")) return;

    // disable both buttons in this row, show spinner
    const row = btn.closest('tr');
    const btns = row.querySelectorAll('button');
    btns.forEach(function(b) {
        b.disabled = true;
        b.classList.add('btn-working');
    });
    btn.innerHTML = '<span class="btn-spinner" style="display:inline-block"></span>Deleting...';

    await fetch(`http://localhost:5000/api/students/${index}`, { method: "DELETE" });

    loadStudents();
    loadReportCards();
}

    async function loadReportCards() {

    const studentRes = await fetch("http://localhost:5000/api/students");
    const students = await studentRes.json();

    const attendanceRes = await fetch("http://localhost:5000/api/attendance");
    const attendance = await attendanceRes.json();

    const gradesRes = await fetch("http://localhost:5000/api/grades");
    const grades = await gradesRes.json();

    let html = "";

    students.forEach(student => {

        // Attendance
        const studentAttendance = attendance.filter(a => a.rollNo === student.rollNo);
        const totalDays = studentAttendance.length;
        const presentDays = studentAttendance.filter(a => a.status.toLowerCase() === "present").length;
        const attendancePercentage = totalDays > 0 ? ((presentDays / totalDays) * 100).toFixed(1) : 0;

        // Grades
        const studentGrades = grades.filter(g => g.name === student.name);
        let totalMarks = 0;
        studentGrades.forEach(g => { totalMarks += Number(g.marks); });
        const percentage = studentGrades.length > 0 ? (totalMarks / studentGrades.length).toFixed(1) : 0;
        let finalGrade = "C";
        if (percentage >= 80) finalGrade = "A";
        else if (percentage >= 60) finalGrade = "B";

        // profile photo from localStorage
        const photoKey = "profile_" + student.rollNo;
        const savedPhoto = localStorage.getItem(photoKey);
        const initials = student.name.split(" ").map(n => n[0]).join("").toUpperCase().slice(0, 2);
        const photoHTML = savedPhoto
            ? `<img class="profile-photo" src="${savedPhoto}" alt="${student.name}"/>`
            : `<div class="profile-placeholder">${initials}</div>`;

        html += `
        <div class="report-card">
            <div class="report-card-left">
                <h3>${student.name}</h3>
                <p><strong>Roll No:</strong> ${student.rollNo}</p>
                <p><strong>Class:</strong> ${student.className || "N/A"}</p>
                <p><strong>Attendance:</strong> ${attendancePercentage}%</p>
                <p><strong>Total Marks:</strong> ${totalMarks}</p>
                <p><strong>Percentage:</strong> ${percentage}%</p>
                <p><strong>Final Grade:</strong> ${finalGrade}</p>
                <h4 style="margin-top:12px;">Exam Records</h4>
                <table border="1" cellpadding="8" width="100%">
                    <tr><th>Exam</th><th>Subject</th><th>Marks</th></tr>
                    ${studentGrades.map(g => `
                        <tr>
                            <td>${g.exam}</td>
                            <td>${g.subject}</td>
                            <td>${g.marks}</td>
                        </tr>
                    `).join("")}
                </table>
            </div>
            <div class="report-card-right">
                ${photoHTML}
                <span class="student-name-badge">${student.name.split(" ")[0]}</span>
                <label class="upload-label" for="upload_${student.rollNo}">📷 Change Photo</label>
                <input class="upload-input" type="file" accept="image/*"
                       id="upload_${student.rollNo}"
                       onchange="uploadPhoto(this, '${student.rollNo}')"/>
            </div>
        </div>
        `;
    });

    document.getElementById("reportCards").innerHTML = html;
}

function uploadPhoto(input, rollNo) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        localStorage.setItem("profile_" + rollNo, e.target.result);
        loadReportCards();
    };
    reader.readAsDataURL(file);
}

// run on page load
loadStudents();
loadReportCards();

async function searchStudent() {

    const query =
        document.getElementById("searchInput")
        .value
        .toLowerCase()
        .trim();

    const studentsRes = await fetch("http://localhost:5000/api/students");
    const students = await studentsRes.json();

    const attendanceRes = await fetch("http://localhost:5000/api/attendance");
    const attendance = await attendanceRes.json();

    const gradesRes = await fetch("http://localhost:5000/api/grades");
    const grades = await gradesRes.json();

    const student = students.find(s =>
        s.name.toLowerCase().includes(query) ||
        String(s.rollNo) === query
    );

    if (!student) {

        document.getElementById("searchResult").innerHTML =
            "<p>Student not found</p>";

        return;
    }

    // Attendance
    const studentAttendance = attendance.filter(
        a =>
        String(a.rollNo).trim() ===
        String(student.rollNo).trim()
    );

    // Grades
    const studentGrades = grades.filter(
        g =>
        String(g.rollNo).trim() ===
        String(student.rollNo).trim()
    );

    let totalMarks = 0;

    studentGrades.forEach(g => {
        totalMarks += Number(g.marks);
    });

    const percentage =
        studentGrades.length
        ? (totalMarks / studentGrades.length).toFixed(1)
        : 0;

    let grade = "C";

    if (percentage >= 80) grade = "A";
    else if (percentage >= 60) grade = "B";

    let html = `
        <div class="card">

            <h2>${student.name}</h2>

            <p><strong>Roll No:</strong> ${student.rollNo}</p>

            <p><strong>Final Percentage:</strong> ${percentage}%</p>

            <p><strong>Final Grade:</strong> ${grade}</p>

            <h3>Attendance Records</h3>

            <table border="1">
                <tr>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
    `;

    studentAttendance.forEach(a => {

        html += `
            <tr>
                <td>${a.date}</td>
                <td>${a.status}</td>
            </tr>
        `;
    });

    html += `
        </table>

        <h3>Exam Records</h3>

        <table border="1">

            <tr>
                <th>Exam</th>
                <th>Subject</th>
                <th>Marks</th>
            </tr>
    `;

    studentGrades.forEach(g => {

        html += `
            <tr>
                <td>${g.exam}</td>
                <td>${g.subject}</td>
                <td>${g.marks}</td>
            </tr>
        `;
    });

    html += `
        </table>
        </div>
    `;

    document.getElementById("searchResult").innerHTML = html;
}

</script>
</body>

</html>
