<table border="1">

<!-- ATTENDANCE HISTORY -->
<h3>Attendance History</h3>

<input type="date" id="filterDate">
<button onclick="filterAttendance()">Filter</button>

<table border="1">
    <thead>
        <tr>
            <th>Name</th>

        </tr>

</table>

 <h3>Attendance Dashboard</h3>

<table border="1">
    <thead>
        <tr>
            <th>Name</th>
            <th>Total Days</th>
            <th>Present</th>
            <th>Absent</th>

        </tr>
    </thead>

</table>
            
        </div>
    </main>
    <footer>

    </footer>
    <script>

        if (!localStorage.getItem("user")) {
       window.location.href = "login.html";
    }
async function markAttendance(rollNo, status) {
    const date = document.getElementById("date").value;

    if (!date) {
        alert("Please select date");
        return;
    }

    await fetch("http://localhost:5000/api/attendance", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ rollNo, status, date })
    });

    alert("Attendance saved");

    loadStudents();     // refresh buttons
    loadAttendance();   // update history
}

async function loadStudents() {
    
    console.log("loadStudents running");

    const studentsRes = await fetch("http://localhost:5000/api/students");
    const students = await studentsRes.json();
    

    const res2 = await fetch("http://localhost:5000/api/attendance");
    const attendance = await res2.json();

    const selectedDate = document.getElementById("date").value || null;

    let html = "";

    students.forEach(s => {

        // check if this student already marked
        const alreadyMarked = selectedDate
    ? attendance.some(a => a.rollNo === s.rollNo && a.date === selectedDate)
    : false;

       html += `
<tr>
    <td>${s.name}</td>
    <td>${s.rollNo}</td>
    <td>
        <button 
            class="presentBtn"
            ${alreadyMarked ? "disabled" : ""}
            style="opacity:${alreadyMarked ? "0.5" : "1"}"
            onclick="markAttendance('${s.rollNo}', 'Present')">
            Present
        </button>

        <button 
            class="absentBtn"
            ${alreadyMarked ? "disabled" : ""}
            style="opacity:${alreadyMarked ? "0.5" : "1"}"
            onclick="markAttendance('${s.rollNo}', 'Absent')">
            Absent
        </button>
    </td>
</tr>
`;
    });

    document.getElementById("studentTable").innerHTML = html;
}
async function loadAttendance() {

    const studentsRes = await fetch("http://localhost:5000/api/students");
    const students = await studentsRes.json();

    const res = await fetch("http://localhost:5000/api/attendance");
    const data = await res.json();

    const validRollNos = new Set(students.map(s => String(s.rollNo).trim()));

    let html = "";

    data.forEach(a => {
        if (!validRollNos.has(String(a.rollNo).trim())) return;

        const student = students.find(s => String(s.rollNo).trim() === String(a.rollNo).trim());

        html += `
        <tr>
            <td>${student ? student.name : ""}</td>
            <td>${a.rollNo}</td>
            <td>${a.status}</td>
            <td>${a.date}</td>
        </tr>
        `;
    });

    document.getElementById("historyTable").innerHTML = html || "<tr><td colspan='4' style='text-align:center'>No attendance records found</td></tr>";
}
async function filterAttendance() {

    const selectedDate = document.getElementById("filterDate").value;

    const studentsRes = await fetch("http://localhost:5000/api/students");
    const students = await studentsRes.json();

    const res = await fetch("http://localhost:5000/api/attendance");
    const data = await res.json();

    const validRollNos = new Set(students.map(s => String(s.rollNo).trim()));

    let html = "";

    data.forEach(a => {
        if (!validRollNos.has(String(a.rollNo).trim())) return;
        if (selectedDate && a.date !== selectedDate) return;

        const student = students.find(s => String(s.rollNo).trim() === String(a.rollNo).trim());

        html += `
        <tr>
            <td>${student ? student.name : ""}</td>
            <td>${a.rollNo}</td>
            <td>${a.status}</td>
            <td>${a.date}</td>
        </tr>
        `;
    });

    document.getElementById("historyTable").innerHTML = html || "<tr><td colspan='4' style='text-align:center'>No records found</td></tr>";
}

window.onload = function () {
    loadStudents();
    loadAttendance();
    loadDashboard();

    document.getElementById("date").addEventListener("change", function () {
        loadStudents(); // 🔥 this is enough
    });
};
async function loadDashboard() {

    const studentsRes = await fetch("http://localhost:5000/api/students");
    const students = await studentsRes.json();

    const res = await fetch("http://localhost:5000/api/attendance");
    const data = await res.json();

    const validRollNos = new Set(students.map(s => String(s.rollNo).trim()));
    const studentsMap = {};

    data.forEach(a => {
        if (!validRollNos.has(String(a.rollNo).trim())) return;

        if (!studentsMap[a.rollNo]) {
            const student = students.find(s => String(s.rollNo).trim() === String(a.rollNo).trim());
            studentsMap[a.rollNo] = { name: student ? student.name : null, total: 0, present: 0, absent: 0 };
        }

        studentsMap[a.rollNo].total++;
        if (a.status === "Present") studentsMap[a.rollNo].present++;
        else studentsMap[a.rollNo].absent++;
    });

    let html = "";

    Object.values(studentsMap).forEach(s => {
        if (!s.name) return;
        const percentage = s.total ? ((s.present / s.total) * 100).toFixed(1) : 0;
        html += `
        <tr>
            <td>${s.name}</td>
            <td>${s.total}</td>
            <td>${s.present}</td>
            <td>${s.absent}</td>
            <td>${percentage}%</td>
        </tr>
        `;
    });

    document.getElementById("dashboardTable").innerHTML = html || "<tr><td colspan='5' style='text-align:center'>No data available</td></tr>";
}
</script>
</body>
